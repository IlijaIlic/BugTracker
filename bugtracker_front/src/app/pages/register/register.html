<div class="universal-page">
    <form class="register-form shadow" name="register">
        <h1 class="register-title">Create <span style="font-weight: 200;"> new account! </span></h1>
        <div class="input-cont">
            <label>Username</label>
            <input class="universal-inp-text" type="text" placeholder="JohnDoe123" />
        </div>
        <div class="input-cont">
            <label>Email</label>
            <input class="universal-inp-text" type="text" placeholder="Enter your email..." />
        </div>
        <div class="passwords">
            <div class="input-cont">
                <label>Password</label>
                <input class="universal-inp-text" type="password" />
            </div>
            <div class="input-cont">
                <label>Repeat password</label>
                <input class="universal-inp-text" type="password" />
            </div>
        </div>
        <app-combobox [placeHolderText]="'Select your role...'" [options]="['Manager', 'Tester']"/>
        <button class="universal-btn register-btn" type="submit">Register</button>
    </form>
    <span class="login-redirect">Already have an account?
        <button type="button" [routerLink]="'/login'">Login!</button>
    </span>
</div>
